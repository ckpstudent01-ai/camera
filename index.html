<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>QR Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{

background:#f5f5f5;
text-align:center;

}

.header{

background:#1565C0;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;

}

#reader{

width:100%;
max-width:400px;
margin:20px auto;

}

.result{

width:90%;
max-width:400px;
margin:auto;
padding:15px;
background:white;
border-radius:10px;
font-size:20px;
font-weight:bold;
color:#1565C0;
box-shadow:0 2px 10px rgba(0,0,0,.15);

}

.buttons{

margin-top:20px;

}

button{

padding:12px 25px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;

}

.start{

background:#2E7D32;
color:white;

}

.stop{

background:#C62828;
color:white;

}

</style>

</head>

<body>

<div class="header">
สแกน QR Code
</div>

<div id="reader"></div>

<div class="result" id="result">
รอการสแกน...
</div>

<div class="buttons">

<button class="start" onclick="startScanner()">
📷 เปิดกล้อง
</button>

<button class="stop" onclick="stopScanner()">
❌ ปิดกล้อง
</button>

</div>

<script>

let html5QrCode;
let scanning=false;
let lastCode="";

function startScanner(){

if(scanning) return;

html5QrCode=new Html5Qrcode("reader");

html5QrCode.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:{
width:250,
height:250
}
},

onScanSuccess

).then(()=>{

scanning=true;

}).catch(err=>{

alert("ไม่สามารถเปิดกล้องได้");

console.log(err);

});

}

function onScanSuccess(decodedText){

if(decodedText===lastCode) return;

lastCode=decodedText;

document.getElementById("result").innerHTML=
"สแกนสำเร็จ<br><br>"+decodedText;

// หากต้องการส่งไป Apps Script ให้เรียกฟังก์ชันนี้
// sendData(decodedText);

navigator.vibrate?.(200);

}

function stopScanner(){

if(!scanning) return;

html5QrCode.stop().then(()=>{

html5QrCode.clear();

scanning=false;

document.getElementById("result").innerHTML="ปิดกล้องแล้ว";

}).catch(err=>{

console.log(err);

});

}

// เปิดกล้องอัตโนมัติเมื่อเปิดหน้าเว็บ
window.onload=function(){

startScanner();

};

</script>

</body>
</html>
