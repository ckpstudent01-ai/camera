<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #f5f5f5;
            text-align: center;
        }
        .header {
            background: #1565C0;
            color: white;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }
        #reader {
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }
        /* ส่วนสำหรับเปลี่ยนการแสดงผลเมื่อสแกนสำเร็จ */
        #main-container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            padding: 15px;
        }
        .result {
            padding: 15px;
            background: white;
            border-radius: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #1565C0;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .start {
            background: #2E7D32;
            color: white;
        }
        .stop {
            background: #C62828;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    ระบบสแกนเช็คชื่อนักเรียน
</div>

<div id="main-container">
    <div id="reader"></div>
    <div class="result" id="result">
        รอการสแกน...
    </div>
</div>

<div class="buttons">
    <button class="start" onclick="startScanner()">📸 เปิดกล้อง</button>
    <button class="stop" onclick="stopScanner()">❌ ปิดกล้อง</button>
</div>

<script>
let html5QrCode;
let scanning = false;
let lastCode = "";

// ⚠️ สำคัญมาก: นำลิงก์ Web App ของ Google Apps Script (ที่ลงท้ายด้วย /exec) มาวางแทนที่ตรงนี้
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxUPSWjVAfg8y343LLP2PEmGyLyANGYJukSYlFMnCmRR6RTi_g6q9BShaXdSD8gAJUpWg/exec"; 

function startScanner() {
    if (scanning) return;
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: { width: 250, height: 250 }
        },
        onScanSuccess
    ).then(() => {
        scanning = true;
        document.getElementById("result").innerText = "กล้องพร้อมสแกนคิวอาร์โค้ด...";
    }).catch(err => {
        alert("ไม่สามารถเปิดกล้องได้");
        console.log(err);
    });
}

function stopScanner() {
    if (!scanning) return;
    html5QrCode.stop().then(() => {
        scanning = false;
        document.getElementById("result").innerText = "ปิดกล้องแล้ว";
    }).catch(err => {
        console.log(err);
    });
}

// รวมฟังก์ชันการทำงานสแกนสำเร็จไว้เป็นหนึ่งเดียว
function onScanSuccess(decodedText) {
    // ป้องกันการยิงสแกนซ้ำซ้อนโค้ดเดิมแบบรัวๆ
    if (decodedText === lastCode) return;
    lastCode = decodedText;

    // ระบบสั่นเตือนบนมือถือ
    navigator.vibrate?.(200);
    
    document.getElementById("result").innerHTML = "📥 กำลังส่งข้อมูลรหัส: " + decodedText;
    
    // หยุดการทำงานกล้องชั่วคราวก่อนเพื่อเตรียมเปลี่ยนหน้าจอ
    if (scanning) {
        html5QrCode.stop().then(() => { scanning = false; });
    }

    // ส่งข้อมูลแบบ POST ไปที่ Web App ของ Google Apps Script ตัวหลัก
    fetch(WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ number: decodedText }),
        headers: { "Content-Type": "text/plain" } // ใช้ text/plain เพื่อเลี่ยงการติดปัญหา CORS ของตัวเบราว์เซอร์
    })
    .then(response => response.json())
    .then(result => {
        const mainContainer = document.getElementById('main-container'); 
        
        if (result.success) {
            // กรณี Google Sheet บันทึกข้อมูลเรียบร้อย
            mainContainer.innerHTML = `
                <div style="text-align:center; padding:30px; background:#ffffff; border-radius:10px; font-family:sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top:20px;">
                    <h2 style="color:#28a745; margin-bottom:15px;">✅ บันทึกสำเร็จ</h2>
                    <h3 style="color:#333; margin-bottom:10px;">${result.studentName}</h3>
                    <p style="color:#666; font-size:16px;">ระดับชั้น: ห้อง ${result.studentRoom} <br>เวลา: ${result.time} น.</p>
                    <button onclick="window.close()" style="padding:12px 35px; background:#222222; color:#ffffff; border:none; border-radius:25px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:20px;">
                        🚪 ปิดหน้าต่างนี้
                    </button>
                </div>
            `;
        } else {
            // กรณีผิดพลาด นอกเวลาเรียน หรือไม่มีรหัสในชีท
            mainContainer.innerHTML = `
                <div style="text-align:center; padding:30px; background:#ffffff; border-radius:10px; font-family:sans-serif; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top:20px;">
                    <h2 style="color:#dc3545; margin-bottom:15px;">❌ บันทึกไม่สำเร็จ</h2>
                    <p style="color:#333; font-size:16px; font-weight:bold; margin-bottom:15px;">${result.message}</p>
                    <button onclick="location.reload()" style="padding:10px 20px; background:#1565C0; color:#fff; border:none; border-radius:8px; cursor:pointer; font-size:14px; margin-right:10px;">🔄 ลองใหม่</button>
                    <button onclick="window.close()" style="padding:10px 20px; background:#555555; color:#ffffff; border:none; border-radius:8px; cursor:pointer; font-size:14px;">🚪 ปิดหน้า</button>
                </div>
            `;
        }
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById("result").innerHTML = "<span style='color:red;'>เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย</span><br><br><small>กรุณาตรวจสอบว่ากรอก URL เว็บแอปถูกต้องแล้วหรือไม่</small>";
        // เพิ่มปุ่มลองใหม่กรณีเน็ตหลุด
        setTimeout(() => { lastCode = ""; startScanner(); }, 3000);
    });
}

// สั่งให้กล้องเปิดทำงานอัตโนมัติทันทีที่เข้าหน้าเว็บ
window.onload = function() {
    startScanner();
};
</script>

</body>
</html>
