<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>QR Scanner (Mobile Compatible)</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Tahoma, sans-serif; }
        body { background: #f5f5f5; text-align: center; }
        .header { background: #1565C0; color: white; padding: 15px; font-size: 22px; font-weight: bold; }
        #reader { width: 90%; max-width: 400px; margin: 20px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); min-height: 250px; }
        #main-container { width: 90%; max-width: 400px; margin: auto; padding: 15px; }
        .result { padding: 15px; background: white; border-radius: 10px; font-size: 18px; font-weight: bold; color: #1565C0; box-shadow: 0 2px 10px rgba(0,0,0,.15); }
        #start-btn {
            display: block; margin: 15px auto; padding: 14px 40px;
            background: #1565C0; color: #fff; border: none; border-radius: 30px;
            font-size: 17px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(21,101,192,.35);
        }
        #start-btn:active { background: #0d47a1; }
        .gps-status {
            margin: 10px auto; padding: 8px 12px; border-radius: 8px;
            font-size: 14px; max-width: 400px;
            background: #fff8e1; color: #7a5b00; border: 1px solid #f0e2ad;
        }
        .gps-status.ok { background: #e7f6ec; color: #146c2e; border-color: #c3e8cf; }
        .gps-status.err { background: #fdecea; color: #a12622; border-color: #f3c6c3; }
    </style>
</head>
<body>

<div class="header">📸 สแกน QR Code (เปิดบนมือถือได้)</div>

<div id="main-container">
    <div class="gps-status" id="gps-status">📍 กำลังขอสิทธิ์เข้าถึงตำแหน่ง...</div>
    <button id="start-btn" onclick="startScanner()">📷 กดเพื่อเปิดกล้อง</button>
    <div id="reader"></div>
    <div class="result" id="result">กดปุ่มด้านบนเพื่อเริ่มใช้งานกล้อง</div>
</div>

<script>
let html5QrCode;
let scanning = false;
let lastCode = "";
let currentPosition = null; // ตำแหน่ง GPS ล่าสุด ใช้แนบไปกับข้อมูลที่ส่งกลับ Apps Script

function initGeolocation() {
    const gpsBar = document.getElementById('gps-status');
    if (!navigator.geolocation) {
        gpsBar.className = 'gps-status err';
        gpsBar.innerText = '🔴 อุปกรณ์นี้ไม่รองรับการระบุตำแหน่ง GPS';
        return;
    }

    // ขอตำแหน่งทันทีครั้งแรก (บังคับให้ขึ้น popup ขอสิทธิ์เร็วที่สุด และได้พิกัดแรกไวที่สุด)
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            gpsBar.className = 'gps-status ok';
            gpsBar.innerText = '✅ พร้อมใช้งานตำแหน่ง (ความแม่นยำ ~' + Math.round(pos.coords.accuracy) + ' ม.)';
        },
        (err) => {
            currentPosition = null;
            gpsBar.className = 'gps-status err';
            gpsBar.innerText = '🔴 ยังไม่ได้รับสิทธิ์ตำแหน่ง กรุณาอนุญาต GPS แล้วกดปุ่มกล้องใหม่';
        },
        { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );

    // ติดตามตำแหน่งต่อเนื่อง เผื่อผู้ใช้ขยับตัว หรือพิกัดแรกยังไม่แม่นยำพอ
    navigator.geolocation.watchPosition(
        (pos) => {
            currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            gpsBar.className = 'gps-status ok';
            gpsBar.innerText = '✅ พร้อมใช้งานตำแหน่ง (ความแม่นยำ ~' + Math.round(pos.coords.accuracy) + ' ม.)';
        },
        (err) => { console.warn("Geolocation watch error:", err); },
        { enableHighAccuracy: true, maximumAge: 8000, timeout: 15000 }
    );
}

// เช็คก่อนว่าเบราว์เซอร์รองรับ getUserMedia และเป็น HTTPS/localhost หรือไม่
function checkEnvironment() {
    if (!window.isSecureContext) {
        document.getElementById("result").innerHTML =
            "<span style='color:red;'>❌ ต้องเปิดผ่าน HTTPS เท่านั้น</span><br><small>ลิงก์นี้เปิดผ่าน http ธรรมดา กล้องจะใช้งานไม่ได้ กรุณาใช้ลิงก์ https</small>";
        return false;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        document.getElementById("result").innerHTML =
            "<span style='color:red;'>❌ เบราว์เซอร์นี้ไม่รองรับกล้อง</span><br><small>กรุณาเปิดด้วย Safari หรือ Chrome เวอร์ชันล่าสุด (ห้ามเปิดในแอป LINE/Facebook)</small>";
        return false;
    }
    return true;
}

function startScanner() {
    if (scanning) return;
    if (!checkEnvironment()) return;

    document.getElementById("start-btn").style.display = "none";
    document.getElementById("result").innerText = "กำลังขอสิทธิ์เข้าถึงกล้อง...";

    initGeolocation(); // ขอสิทธิ์ตำแหน่งไปพร้อมกัน (ใช้ยืนยันว่าอยู่ในพื้นที่โรงเรียน)

    html5QrCode = new Html5Qrcode("reader");

    // พยายามเปิดกล้องหลังก่อน (facingMode: environment)
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
    ).then(() => {
        scanning = true;
        document.getElementById("result").innerText = "วางคิวอาร์โค้ดในกรอบเพื่อเช็คชื่อ";
    }).catch(err => {
        console.error("facingMode environment failed:", err);
        // ถ้าใช้ facingMode ไม่ได้ (เช่น อุปกรณ์ไม่มีกล้องหลังชัดเจน) ให้ลอง fallback ด้วยการเลือกกล้องจากรายการ
        tryFallbackCamera(err);
    });
}

function tryFallbackCamera(originalErr) {
    Html5Qrcode.getCameras().then(devices => {
        if (!devices || devices.length === 0) {
            showCameraError(originalErr, "ไม่พบกล้องในอุปกรณ์นี้");
            return;
        }
        // เลือกกล้องตัวสุดท้าย (มักเป็นกล้องหลังบนมือถือส่วนใหญ่)
        const cameraId = devices[devices.length - 1].id;
        html5QrCode.start(
            cameraId,
            { fps: 10, qrbox: { width: 250, height: 250 } },
            onScanSuccess
        ).then(() => {
            scanning = true;
            document.getElementById("result").innerText = "วางคิวอาร์โค้ดในกรอบเพื่อเช็คชื่อ";
        }).catch(err2 => {
            showCameraError(err2);
        });
    }).catch(err2 => {
        showCameraError(originalErr, "ไม่ได้รับอนุญาตให้เข้าถึงรายการกล้อง");
    });
}

function showCameraError(err, customMsg) {
    let reason = customMsg || "";
    const name = err && err.name ? err.name : "";
    if (name === "NotAllowedError" || /Permission/i.test(String(err))) {
        reason = "สิทธิ์การใช้กล้องถูกปฏิเสธ กรุณาไปที่การตั้งค่าเบราว์เซอร์ > สิทธิ์เว็บไซต์นี้ > อนุญาตกล้อง แล้วรีเฟรชหน้าใหม่";
    } else if (name === "NotFoundError") {
        reason = "ไม่พบกล้องในอุปกรณ์นี้";
    } else if (name === "NotReadableError") {
        reason = "กล้องถูกใช้งานโดยแอปอื่นอยู่ กรุณาปิดแอปที่ใช้กล้องอื่นแล้วลองใหม่";
    } else if (name === "OverconstrainedError") {
        reason = "อุปกรณ์นี้ไม่รองรับการตั้งค่ากล้องที่ระบุ";
    } else if (name === "SecurityError") {
        reason = "ต้องเปิดผ่าน HTTPS เท่านั้น";
    }
    document.getElementById("start-btn").style.display = "block";
    document.getElementById("start-btn").innerText = "🔄 ลองเปิดกล้องอีกครั้ง";
    document.getElementById("result").innerHTML =
        "<span style='color:red;'>❌ ไม่สามารถเปิดกล้องได้</span><br><small>" + reason +
        "</small><br><small style='color:#999;'>กรุณาเปิดลิงก์นี้บน Safari/Chrome ปกติ (ห้ามเปิดในไลน์)</small>";
    console.error(err);
}

function onScanSuccess(decodedText) {
    if (decodedText === lastCode) return;
    lastCode = decodedText;
    navigator.vibrate?.(200);

    document.getElementById("result").innerHTML = "⏳ สแกนเจอเลข " + decodedText + " กำลังตรวจสอบตำแหน่ง...";

    if (scanning) {
        html5QrCode.stop().then(() => { scanning = false; sendData(decodedText); });
    } else {
        sendData(decodedText);
    }
}

function sendData(studentId) {
    if (currentPosition) {
        postToServer(studentId, currentPosition.lat, currentPosition.lng);
        return;
    }

    // ยังไม่มีพิกัด (watchPosition ยังไม่ทันได้ค่าแรก) ให้ลองขอตำแหน่งสดอีกครั้งก่อนส่ง แทนที่จะส่ง null ไปเลย
    document.getElementById("result").innerHTML = "📍 กำลังค้นหาตำแหน่ง GPS กรุณารอสักครู่...";
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            currentPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            postToServer(studentId, currentPosition.lat, currentPosition.lng);
        },
        (err) => {
            document.getElementById("result").innerHTML =
                "<span style='color:red;'>❌ ไม่สามารถระบุตำแหน่งได้</span><br>" +
                "<small>กรุณาเปิด GPS/Location Services ของเครื่อง และอนุญาตสิทธิ์ตำแหน่งให้เว็บไซต์นี้ แล้วลองสแกนใหม่</small>";
            lastCode = ""; // ปลดล็อคให้สแกนรหัสเดิมซ้ำได้อีกครั้งหลังแก้ไข GPS แล้ว
            startScanner(); // เปิดกล้องต่อให้ลองสแกนใหม่ได้เลยหลังแก้ปัญหา GPS
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
}

function postToServer(studentId, lat, lng) {
    document.getElementById("result").innerHTML = "⏳ กำลังบันทึกข้อมูล...";

    // 💡 ดึงพารามิเตอร์ url ที่ส่งมาจากหน้าหลัก Apps Script โค้ดฝั่ง GitHub จึงไม่ต้องฟิกซ์ลิงก์ตายตัวอีกต่อไป
    const urlParams = new URLSearchParams(window.location.search);
    let webAppUrl = urlParams.get('url');

    // ถ้าไม่มีการส่ง url มา ให้ใช้ระบบ Prompt ถามผู้ใช้ (ป้องกันการเปิดตรงๆ)
    if (!webAppUrl) {
        alert("กรุณาเปิดหน้านี้ผ่านทางหน้าหลักของระบบ Google Apps Script เท่านั้น");
        location.reload();
        return;
    }

    // ส่งข้อมูลข้ามไปบันทึกที่ Google Apps Script เวอร์ชันปัจจุบันโดยตรง (แนบพิกัด GPS ไปด้วย)
    fetch(webAppUrl, {
        method: "POST",
        body: JSON.stringify({ number: studentId, lat: lat, lng: lng }),
        headers: { "Content-Type": "text/plain" }
    })
    .then(response => response.json())
    .then(result => {
        const mainContainer = document.getElementById('main-container');
        if (result.success) {
            mainContainer.innerHTML = `
                <div style="text-align:center; padding:30px; background:#ffffff; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top:20px;">
                    <h2 style="color:#28a745; margin-bottom:15px;">✅ บันทึกสำเร็จ</h2>
                    <h3 style="color:#333; margin-bottom:10px;">${result.studentName}</h3>
                    <p style="color:#666; font-size:16px;">ห้อง: ${result.studentRoom} | เวลา: ${result.time} น.</p>
                    <button onclick="location.reload()" style="padding:12px 35px; background:#1565C0; color:#ffffff; border:none; border-radius:25px; font-size:16px; font-weight:bold; cursor:pointer; margin-top:20px;">
                        👉 สแกนคนต่อไป
                    </button>
                    <br>
                    <button onclick="window.close()" style="padding:8px 25px; background:transparent; color:#555; border:1px solid #ccc; border-radius:20px; font-size:14px; cursor:pointer; margin-top:12px;">
                        ⬅️ ปิดหน้าต่างนี้ กลับหน้าหลัก
                    </button>
                </div>`;
        } else {
            mainContainer.innerHTML = `
                <div style="text-align:center; padding:30px; background:#ffffff; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top:20px;">
                    <h2 style="color:#dc3545; margin-bottom:15px;">❌ ไม่สำเร็จ</h2>
                    <p style="color:#333; font-size:16px; font-weight:bold; margin-bottom:15px;">${result.message}</p>
                    <button onclick="location.reload()" style="padding:10px 20px; background:#555; color:#ffffff; border:none; border-radius:8px; cursor:pointer;">🔄 ลองใหม่</button>
                </div>`;
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อกรุณาลองใหม่");
        location.reload();
    });
}
</script>
</body>
</html>
