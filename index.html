<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>QR Scanner For Google Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Tahoma, sans-serif;
        }
        body {
            background: #f5f5f5;
            text-align: center;
        }
        .header {
            background: #1565C0;
            color: white;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
        }
        #reader {
            width: 90%;
            max-width: 400px;
            margin: 20px auto;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .result {
            width: 90%;
            max-width: 400px;
            margin: auto;
            padding: 15px;
            background: white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #1565C0;
            box-shadow: 0 2px 10px rgba(0,0,0,.15);
        }
        .buttons {
            margin-top: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
            font-weight: bold;
        }
        .start {
            background: #2E7D32;
            color: white;
        }
        .stop {
            background: #C62828;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    📸 หน้าจอกล้องสแกน QR Code
</div>

<div id="reader"></div>

<div class="result" id="result">
    กำลังเปิดกล้องอัตโนมัติ...
</div>

<div class="buttons">
    <button class="start" onclick="startScanner()">📸 เปิดกล้อง</button>
    <button class="stop" onclick="stopScanner()">❌ ปิดกล้อง</button>
</div>

<script>
let html5QrCode;
let scanning = false;
let lastCode = "";

function startScanner() {
    if (scanning) return;
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, // บังคับเปิดกล้องหลัง
        {
            fps: 10,
            qrbox: { width: 250, height: 250 }
        },
        onScanSuccess
    ).then(() => {
        scanning = true;
        document.getElementById("result").innerText = "วางคิวอาร์โค้ดให้อยู่ในกรอบเพื่อสแกน";
    }).catch(err => {
        document.getElementById("result").innerText = "ไม่สามารถเปิดกล้องได้ (กรุณาอนุญาตสิทธิ์)";
        console.error(err);
    });
}

function stopScanner() {
    if (!scanning) return;
    html5QrCode.stop().then(() => {
        scanning = false;
        document.getElementById("result").innerText = "ปิดกล้องแล้ว";
    }).catch(err => console.error(err));
}

function onScanSuccess(decodedText) {
    // ป้องกันการสแกนซ้ำโค้ดเดิมแบบรัวๆ
    if (decodedText === lastCode) return;
    lastCode = decodedText;

    // ระบบสั่นเตือน (ทำงานเฉพาะบนแอนดรอยด์/โครม)
    navigator.vibrate?.(200);
    
    document.getElementById("result").innerHTML = "✅ สแกนเจอคุณสำเร็จ: " + decodedText + "<br><small>กำลังส่งข้อมูล...</small>";
    
    // หยุดกล้องทันทีเมื่อสแกนเจอ
    if (scanning) {
        html5QrCode.stop().then(() => {
            scanning = false;
            sendToAppsScript(decodedText);
        });
    } else {
        sendToAppsScript(decodedText);
    }
}

function sendToAppsScript(studentId) {
    // 💡 ค้นหาลิงก์หน้าเว็บหลักของ Apps Script ที่เปิดหน้านี้ขึ้นมา 
    // โดยส่งค่ารหัสประจำตัวกลับไปในรูปแบบพารามิเตอร์เพื่อให้ฝั่งโน้นจัดการต่อ
    const openerUrl = window.opener ? window.opener.location.href : null;
    
    if (openerUrl) {
        // ทำการล้างค่า parameter เก่าออกก่อน (ถ้ามี) แล้วแปะ ?id=[รหัส] เข้าไปใหม่
        const baseUrl = openerUrl.split('?')[0];
        const targetUrl = baseUrl + "?id=" + encodeURIComponent(studentId);
        
        // สั่งให้หน้าต่างหลัก (หน้า Apps Script) โหลดข้อมูลใหม่ตาม ID ที่สแกนได้
        window.opener.location.href = targetUrl;
        
        // แสดงข้อความบนหน้าจอก่อนปิดตัวเอง
        document.getElementById("result").innerHTML = "<span style='color:green;'>บันทึกสำเร็จ!</span>";
        
        // รอ 0.5 วินาทีแล้วปิดหน้ากล้อง GitHub ทันที ปล่อยให้ผู้ใช้ดูผลที่หน้าจอหลัก
        setTimeout(() => {
            window.close();
        }, 500);
    } else {
        // กรณีเปิดหน้าเว็บนี้ขึ้นมาตรงๆ โดยไม่ได้กดเปิดมาจากหน้า Apps Script
        alert("สแกนสำเร็จ รหัสคือ: " + studentId + " \n(กรุณาเปิดหน้าเว็บนี้ผ่านปุ่มบนหน้า Google Apps Script เท่านั้น)");
        // รีเซ็ตเพื่อให้สแกนต่อได้
        lastCode = "";
        startScanner();
    }
}

// สั่งให้ระบบเปิดกล้องอัตโนมัติทันทีเมื่อโหลดหน้าเว็บสำเร็จ
window.onload = function() {
    startScanner();
};
</script>

</body>
</html>
